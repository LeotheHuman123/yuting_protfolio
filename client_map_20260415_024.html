<!--
  CLIENT MAP + DESIGN + SYSTEM VISUALIZATION + DIGITAL TWIN
  ──────────────────────────────────────────
  Four sections, scroll to navigate.

  Section 1 — Client Map
  Section 2 — Design (image grid, color-grouped)
  Section 3 — System Visualization (videoA.mov)
  Section 4 — Digital Twin (VideoB.mov)

  Geocoding: Nominatim / OpenStreetMap (free, no API key).
  Map tiles: CARTO Dark Matter, CSS invert(1) → black on white.
  ──────────────────────────────────────────
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLIENT MAP</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ac: #000000;
  --panel: rgba(255,255,255,.97);
  --bd: #e0e0e0;
  --bd2: #cccccc;
  --txt: #000000;
  --dim: #999999;
  --font: 'Share Tech', monospace;
}

html { scroll-behavior: smooth; }
body { width: 100%; background: #fff; font-family: var(--font); color: var(--txt); overflow-x: hidden; }

/* ── SECTION WRAPPER ── */
.page-section { position: relative; width: 100%; height: 100vh; overflow: hidden; }

/* ── MAP ── */
#map { position: absolute; inset: 0; z-index: 0; }
.leaflet-container { background: #fff !important; }
.leaflet-tile-pane { filter: invert(1) grayscale(1) brightness(1.0) contrast(1.1); }
.leaflet-control-zoom { border: none !important; }
.leaflet-control-zoom a {
  background: rgba(255,255,255,.95) !important; border: 1px solid var(--bd) !important;
  color: var(--dim) !important; border-radius: 0 !important;
  font-size: 16px !important; line-height: 26px !important;
  transition: color .2s, border-color .2s;
}
.leaflet-control-zoom a:hover { color: var(--txt) !important; border-color: var(--ac) !important; }
.leaflet-control-zoom-in { margin-bottom: 1px !important; }
.leaflet-control-attribution {
  background: rgba(255,255,255,.6) !important; color: #bbb !important;
  font-family: var(--font) !important; font-size: 8px !important; letter-spacing: .08em;
}
.leaflet-control-attribution a { color: #ccc !important; }

/* ── POPUP ── */
.leaflet-popup-content-wrapper {
  background: rgba(255,255,255,.99) !important; border: 1px solid var(--bd) !important;
  border-top: 1px solid var(--ac) !important; border-radius: 0 !important;
  box-shadow: 0 4px 32px rgba(0,0,0,.10) !important; padding: 0 !important;
  min-width: 220px; max-width: 260px;
}
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-content { margin: 0 !important; width: auto !important; font-family: var(--font) !important; }
.leaflet-popup-close-button { color: #ccc !important; font-size: 18px !important; top: 6px !important; right: 8px !important; z-index: 10; transition: color .2s; }
.leaflet-popup-close-button:hover { color: var(--txt) !important; background: none !important; }
.pu-body  { padding: 14px 16px 16px; }
.pu-top   { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.pu-idx   { font-size: 8px; letter-spacing: .46em; color: var(--dim); text-transform: uppercase; }
.pu-remove { font-size: 8px; letter-spacing: .2em; color: var(--dim); cursor: pointer; border: 1px solid var(--bd); padding: 2px 7px; transition: color .2s, border-color .2s; background: none; font-family: var(--font); }
.pu-remove:hover { color: var(--txt); border-color: var(--ac); }
.pu-name  { font-size: 14px; letter-spacing: .18em; text-transform: uppercase; margin-bottom: 3px; color: var(--txt); }
.pu-company { font-size: 9px; letter-spacing: .3em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; }
.pu-notes { font-size: 10px; line-height: 1.7; color: #888; letter-spacing: .04em; margin-bottom: 10px; }
.pu-coord { font-size: 8px; color: #ccc; letter-spacing: .1em; }

/* ── SIDEBAR ── */
#sidebar {
  position: absolute; top: 0; left: 0; bottom: 0; width: 280px;
  z-index: 100; background: var(--panel); border-right: 1px solid var(--bd);
  display: flex; flex-direction: column; backdrop-filter: blur(20px);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
}
#sidebar.off { transform: translateX(-280px); }
#sbt {
  position: absolute; right: -38px; top: 50%; transform: translateY(-50%);
  width: 38px; height: 54px;
  background: rgba(255,255,255,.95); border: 1px solid var(--bd); border-left: none;
  cursor: pointer; color: var(--dim); font-size: 10px; letter-spacing: .08em;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  backdrop-filter: blur(12px); transition: color .2s, border-color .2s; z-index: 101;
  writing-mode: vertical-rl;
}
#sbt:hover { color: var(--txt); border-color: var(--ac); }
#sb-head {
  padding: 22px 20px 16px; border-bottom: 1px solid var(--bd);
  display: flex; align-items: flex-end; justify-content: space-between; flex-shrink: 0;
}
#sb-head h1 { font-size: 11px; letter-spacing: .5em; text-transform: uppercase; }
#sb-count { font-size: 8px; letter-spacing: .3em; color: var(--dim); }
#add-btn {
  margin: 14px 16px; padding: 10px;
  border: 1px solid var(--bd2); background: none; color: var(--dim);
  font-family: var(--font); font-size: 9px; letter-spacing: .4em; text-transform: uppercase;
  cursor: pointer; transition: color .2s, border-color .2s; text-align: center;
}
#add-btn:hover { color: var(--txt); border-color: var(--ac); }
#client-list { flex: 1; overflow-y: auto; padding: 0 0 12px; }
#client-list::-webkit-scrollbar { width: 3px; }
#client-list::-webkit-scrollbar-track { background: #fff; }
#client-list::-webkit-scrollbar-thumb { background: #ddd; }
#client-list::-webkit-scrollbar-thumb:hover { background: #bbb; }
.cl-item {
  padding: 12px 20px; border-bottom: 1px solid var(--bd);
  cursor: pointer; transition: background .18s;
  display: flex; align-items: center; gap: 12px;
}
.cl-item:hover { background: rgba(0,0,0,.03); }
.cl-item.active { background: rgba(0,0,0,.05); border-left: 2px solid var(--ac); }
.cl-dot {
  width: 28px; height: 28px; border-radius: 50%;
  background: #000; color: #fff; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; letter-spacing: .02em; font-family: var(--font);
}
.cl-info { min-width: 0; }
.cl-name { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cl-company { font-size: 8px; letter-spacing: .25em; color: var(--dim); text-transform: uppercase; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#empty-state {
  padding: 40px 20px; text-align: center; color: var(--dim);
  font-size: 9px; letter-spacing: .3em; text-transform: uppercase; line-height: 2;
}

/* ── ADD FORM OVERLAY ── */
#form-overlay {
  position: absolute; inset: 0; z-index: 200;
  background: rgba(255,255,255,.7); display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
#form-overlay.show { display: flex; }
#form-box {
  background: #fff; border: 1px solid var(--bd2); border-top: 1px solid var(--ac);
  width: 340px; padding: 28px 28px 24px; box-shadow: 0 8px 48px rgba(0,0,0,.10);
}
#form-box h2 { font-size: 10px; letter-spacing: .5em; text-transform: uppercase; margin-bottom: 22px; }
.f-row { margin-bottom: 16px; }
.f-label { font-size: 8px; letter-spacing: .4em; text-transform: uppercase; color: var(--dim); display: block; margin-bottom: 6px; }
.f-input {
  width: 100%; background: #fff; border: 1px solid var(--bd2); color: var(--txt);
  font-family: var(--font); font-size: 11px; letter-spacing: .1em;
  padding: 9px 10px; outline: none; transition: border-color .2s;
}
.f-input:focus { border-color: var(--ac); }
.f-input::placeholder { color: #ccc; }
textarea.f-input { resize: vertical; min-height: 72px; }
.f-actions { display: flex; gap: 10px; margin-top: 22px; }
.f-btn {
  flex: 1; padding: 10px; border: 1px solid var(--bd2); background: none;
  font-family: var(--font); font-size: 9px; letter-spacing: .4em; text-transform: uppercase;
  cursor: pointer; transition: color .2s, border-color .2s, background .2s; color: var(--dim);
}
.f-btn:hover { color: var(--txt); border-color: var(--ac); }
.f-btn.primary { border-color: var(--ac); color: var(--txt); }
.f-btn.primary:hover { background: var(--ac); color: #fff; }
#form-status { font-size: 8px; letter-spacing: .25em; color: var(--dim); margin-top: 10px; min-height: 14px; }

/* ── TOP BADGE ── */
#map-badge {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 50; background: rgba(255,255,255,.92); border: 1px solid var(--bd);
  padding: 6px 18px; font-size: 8px; letter-spacing: .5em; text-transform: uppercase; color: var(--dim);
  pointer-events: none; backdrop-filter: blur(10px);
}

/* ── MANY MORE ── */
#more-cross {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 60; cursor: default; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
}
#more-cross::before, #more-cross::after {
  content: ''; position: absolute; background: #000;
}
#more-cross::before { width: 2px; height: 14px; }
#more-cross::after  { width: 14px; height: 2px; }
#more-overlay {
  position: absolute; inset: 0; z-index: 55;
  backdrop-filter: blur(0px); background: rgba(255,255,255,0);
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  transition: backdrop-filter .45s ease, background .45s ease;
}
#more-overlay.show { backdrop-filter: blur(12px); background: rgba(255,255,255,.35); }
#more-label {
  font-family: var(--font); font-size: clamp(14px, 1.8vw, 22px);
  letter-spacing: .4em; text-transform: uppercase; color: #000;
  white-space: nowrap; opacity: 0; transform: translateY(6px);
  transition: opacity .4s ease, transform .4s ease;
}
#more-overlay.show #more-label { opacity: 1; transform: translateY(0); }

/* ── VIDEO SECTIONS ── */
.vs-video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; display: block;
}

/* ── SHARED BLUR COVER (video + gallery) ── */
.vs-cover {
  position: absolute; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  transition: backdrop-filter .6s ease, background .6s ease;
  cursor: default;
}
/* Dark cover — for video sections */
.vs-cover--dark {
  backdrop-filter: blur(18px); background: rgba(0,0,0,.18);
}
.vs-cover--dark:hover {
  backdrop-filter: blur(0px); background: rgba(0,0,0,0);
}
/* Light cover — for image gallery (white bg) */
.vs-cover--light {
  backdrop-filter: blur(20px); background: rgba(255,255,255,.55);
}
.vs-cover--light:hover {
  backdrop-filter: blur(0px); background: rgba(255,255,255,0);
}

.vs-cross {
  width: 32px; height: 32px; position: relative;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .4s ease, transform .4s ease;
}
.vs-cross::before, .vs-cross::after {
  content: ''; position: absolute;
}
.vs-cross::before { width: 2px; height: 14px; }
.vs-cross::after  { width: 14px; height: 2px; }
/* cross color per cover type */
.vs-cover--dark  .vs-cross::before,
.vs-cover--dark  .vs-cross::after { background: #fff; }
.vs-cover--light .vs-cross::before,
.vs-cover--light .vs-cross::after { background: #000; }

.vs-title {
  font-family: var(--font); font-size: clamp(22px, 3.5vw, 52px);
  letter-spacing: .28em; text-transform: uppercase;
  white-space: nowrap; transition: opacity .4s ease, transform .4s ease;
  transform: translateY(0);
}
.vs-cover--dark  .vs-title { color: #fff; }
.vs-cover--light .vs-title { color: #000; }

.vs-cover:hover .vs-cross,
.vs-cover:hover .vs-title { opacity: 0; transform: translateY(-6px); }

/* ── DESIGN SECTION — free float ── */
#section-design { height: 100vh; }
#gallery-grid {
  position: absolute; inset: 0; z-index: 0;
  background: #fff; overflow: hidden;
}
.gallery-cell {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.gallery-img {
  width: 100%; height: auto;
  display: block;
}
#design-name {
  position: absolute; bottom: 20px; right: 24px; z-index: 20;
  font-family: var(--font); font-size: 9px; letter-spacing: .42em;
  text-transform: uppercase; color: #000; pointer-events: none;
}

/* ── CLIENT IMAGE SECTION ── */
#client-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; display: block;
}
</style>
</head>
<body>

<!-- ── SECTION 1: DESIGN ── -->
<section class="page-section" id="section-design">
  <div id="gallery-grid"></div>
  <div id="design-name">Yu-Ting Chang</div>
  <div class="vs-cover vs-cover--light">
    <div class="vs-cross"></div>
    <div class="vs-title">Design</div>
  </div>
</section>

<!-- ── SECTION 2: SYSTEM VISUALIZATION ── -->
<section class="page-section">
  <video class="vs-video" autoplay muted loop playsinline>
    <source src="video/videoA.mp4" type="video/mp4">
  </video>
  <div class="vs-cover vs-cover--dark">
    <div class="vs-cross"></div>
    <div class="vs-title">System Visualization</div>
  </div>
</section>

<!-- ── SECTION 3: DIGITAL TWIN ── -->
<section class="page-section">
  <video class="vs-video" autoplay muted loop playsinline>
    <source src="video/videoB.mp4" type="video/mp4">
  </video>
  <div class="vs-cover vs-cover--dark">
    <div class="vs-cross"></div>
    <div class="vs-title">Digital Twin</div>
  </div>
</section>

<!-- ── SECTION 4: CLIENT ── -->
<section class="page-section" id="section-client">
  <img id="client-img" src="image/CLIENT.png" alt="Client Map">
  <div class="vs-cover vs-cover--light">
    <div class="vs-cross"></div>
    <div class="vs-title">Client</div>
  </div>
</section>

<script>
// ── DESIGN GRID ───────────────────────────────────────────────────────
// Images ordered by approximate color family:
// warm editorial (skin/orange) → dark/tech (navy/black) → arena/venue (mixed) → graphic/UI
(function initGallery(){
  const images = [
    'image/1.webp.avif',
    'image/2.webp.avif',
    'image/3.jpg',
    'image/4.gif',
    'image/5.png',
    'image/6.png',
    'image/7.jpg',
    'image/8.jpg',
    'image/9.png',
    'image/10.jpg',
    'image/11.jpg',
    'image/12.jpg',
  ];

  // 4 cols × 3 rows — evenly divide the viewport
  const cols = 4, rows = 3;
  const cw = 100 / cols; // % of width per cell
  const ch = 100 / rows; // % of height per cell

  const grid = document.getElementById('gallery-grid');
  const styleEl = document.createElement('style');
  document.head.appendChild(styleEl);

  images.forEach((src, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);

    // cell centre position
    const cx = cw * col + cw / 2;
    const cy = ch * row + ch / 2;

    // gentle bob — on the cell div so it doesn't conflict with any image transform
    const rise  = (6 + Math.random() * 8).toFixed(1);
    const dur   = (3 + Math.random() * 3.5).toFixed(2);
    const delay = (Math.random() * -6).toFixed(2);

    styleEl.sheet.insertRule(`
      @keyframes bob${i} {
        0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
        50%       { transform: translate(-50%, -50%) translateY(-${rise}px); }
      }
    `, styleEl.sheet.cssRules.length);

    const cell = document.createElement('div');
    cell.className = 'gallery-cell';
    cell.style.left      = `${cx}%`;
    cell.style.top       = `${cy}%`;
    cell.style.width     = `${cw * 0.78}vw`;
    cell.style.maxHeight = `${ch * 0.82}vh`;
    cell.style.animation = `bob${i} ${dur}s ${delay}s ease-in-out infinite`;

    const img = document.createElement('img');
    img.src = src;
    img.className = 'gallery-img';

    cell.appendChild(img);
    grid.appendChild(cell);
  });
})();


</script>
</body>
</html>
