<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yu-Ting Chang</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --nav-w: 220px;
  --font: 'Share Tech', monospace;
  --txt: #000;
  --dim: #999;
  --bd: #e0e0e0;
  --ac: #000;
}

html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: var(--font); background: #fff; color: var(--txt);
}

/* ── LAYOUT ── */
#layout { display: flex; width: 100%; height: 100vh; }

/* ── NAV ── */
#nav {
  width: var(--nav-w);
  flex-shrink: 0;
  border-right: 1px solid var(--bd);
  display: flex;
  flex-direction: column;
  padding: 32px 0 24px;
  z-index: 10;
  background: #fff;
}
#site-title {
  padding: 0 24px 32px;
  font-size: 11px;
  letter-spacing: .42em;
  text-transform: uppercase;
  color: var(--txt);
  border-bottom: 1px solid var(--bd);
  margin-bottom: 16px;
  line-height: 1.5;
}
#site-subtitle {
  font-size: 9px;
  letter-spacing: .28em;
  color: var(--dim);
  text-transform: uppercase;
  margin-top: 4px;
}
#page-list { flex: 1; }
.nav-item {
  display: flex;
  align-items: baseline;
  gap: 14px;
  padding: 12px 24px;
  cursor: pointer;
  border-bottom: 1px solid var(--bd);
  transition: background .15s;
  user-select: none;
}
.nav-item:hover { background: rgba(0,0,0,.03); }
.nav-item.active { background: rgba(0,0,0,.05); }
.nav-item.active .nav-num { color: var(--txt); }
.nav-item.active .nav-label { color: var(--txt); }
.nav-num {
  font-size: 8px;
  letter-spacing: .3em;
  color: var(--dim);
  min-width: 20px;
}
.nav-label {
  font-size: 10px;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--dim);
  transition: color .15s;
}
.nav-item.active .nav-label,
.nav-item:hover .nav-label { color: var(--txt); }
#nav-footer {
  padding: 20px 24px 0;
  font-size: 8px;
  letter-spacing: .25em;
  color: #ccc;
  text-transform: uppercase;
  line-height: 2;
}

/* ── CONTENT AREA ── */
#content {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.page {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity .4s ease;
}
.page.active {
  opacity: 1;
  pointer-events: all;
}

/* ── PAGE 1: DESIGN ── */
#page-design { background: #fff; overflow: hidden; }
#gallery-grid {
  position: absolute;
  inset: 0;
  background: #fff;
  overflow: hidden;
}
.gallery-cell {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.gallery-img {
  width: 100%;
  height: auto;
  display: block;
}
#design-label {
  position: absolute;
  bottom: 20px;
  right: 24px;
  z-index: 20;
  font-size: 8px;
  letter-spacing: .42em;
  text-transform: uppercase;
  color: var(--dim);
  pointer-events: none;
}

/* ── PAGE 2 & 3: VIDEO ── */
.page-video { background: #000; }
.vs-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.vs-label {
  position: absolute;
  bottom: 24px;
  left: 32px;
  font-size: 9px;
  letter-spacing: .42em;
  text-transform: uppercase;
  color: rgba(255,255,255,.35);
  pointer-events: none;
}

/* ── PAGE 4: MAP ── */
#page-map { background: #fff; }
#map { position: absolute; inset: 0; z-index: 0; }
.leaflet-tile-pane { filter: invert(1) grayscale(1) brightness(1.05) contrast(1.1); }
.leaflet-container { background: #fff !important; }
.leaflet-control-zoom { border: none !important; }
.leaflet-control-zoom a {
  background: rgba(255,255,255,.95) !important; border: 1px solid var(--bd) !important;
  color: var(--dim) !important; border-radius: 0 !important;
  font-size: 16px !important; line-height: 26px !important;
}
.leaflet-control-zoom a:hover { color: var(--txt) !important; border-color: var(--ac) !important; }
.leaflet-control-attribution {
  background: rgba(255,255,255,.6) !important; color: #bbb !important;
  font-family: var(--font) !important; font-size: 8px !important; letter-spacing: .08em;
}
.leaflet-control-attribution a { color: #ccc !important; }

/* ── POPUP ── */
.leaflet-popup-content-wrapper {
  background: rgba(255,255,255,.99) !important; border: 1px solid var(--bd) !important;
  border-top: 1px solid var(--ac) !important; border-radius: 0 !important;
  box-shadow: 0 4px 32px rgba(0,0,0,.10) !important; padding: 0 !important;
  min-width: 220px; max-width: 260px;
}
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-content { margin: 0 !important; width: auto !important; font-family: var(--font) !important; }
.leaflet-popup-close-button { color: #ccc !important; font-size: 18px !important; top: 6px !important; right: 8px !important; z-index: 10; }
.leaflet-popup-close-button:hover { color: var(--txt) !important; background: none !important; }
.pu-body  { padding: 14px 16px 16px; }
.pu-top   { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.pu-idx   { font-size: 8px; letter-spacing: .46em; color: var(--dim); text-transform: uppercase; }
.pu-remove { font-size: 8px; letter-spacing: .2em; color: var(--dim); cursor: pointer; border: 1px solid var(--bd); padding: 2px 7px; background: none; font-family: var(--font); }
.pu-remove:hover { color: var(--txt); border-color: var(--ac); }
.pu-name  { font-size: 14px; letter-spacing: .18em; text-transform: uppercase; margin-bottom: 3px; }
.pu-company { font-size: 9px; letter-spacing: .3em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; }
.pu-notes { font-size: 10px; line-height: 1.7; color: #888; letter-spacing: .04em; margin-bottom: 10px; }
.pu-coord { font-size: 8px; color: #ccc; letter-spacing: .1em; }

/* ── MAP SIDEBAR ── */
#map-sidebar {
  position: absolute; top: 0; right: 0; bottom: 0; width: 260px;
  z-index: 100; background: rgba(255,255,255,.97); border-left: 1px solid var(--bd);
  display: flex; flex-direction: column; backdrop-filter: blur(20px);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
}
#map-sidebar.off { transform: translateX(260px); }
#msb-toggle {
  position: absolute; left: -38px; top: 50%; transform: translateY(-50%);
  width: 38px; height: 54px;
  background: rgba(255,255,255,.95); border: 1px solid var(--bd); border-right: none;
  cursor: pointer; color: var(--dim); font-size: 9px; letter-spacing: .08em;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(12px); z-index: 101;
  writing-mode: vertical-rl; text-transform: uppercase;
}
#msb-toggle:hover { color: var(--txt); border-color: var(--ac); }
#msb-head {
  padding: 20px 18px 14px; border-bottom: 1px solid var(--bd);
  display: flex; align-items: flex-end; justify-content: space-between; flex-shrink: 0;
}
#msb-head h2 { font-size: 10px; letter-spacing: .5em; text-transform: uppercase; }
#msb-count { font-size: 8px; letter-spacing: .3em; color: var(--dim); }
#map-add-btn {
  margin: 12px 14px; padding: 9px;
  border: 1px solid var(--bd); background: none; color: var(--dim);
  font-family: var(--font); font-size: 9px; letter-spacing: .4em; text-transform: uppercase;
  cursor: pointer; text-align: center;
}
#map-add-btn:hover { color: var(--txt); border-color: var(--ac); }
#collab-list { flex: 1; overflow-y: auto; padding: 0 0 12px; }
#collab-list::-webkit-scrollbar { width: 3px; }
#collab-list::-webkit-scrollbar-thumb { background: #ddd; }
.cl-item {
  padding: 10px 18px; border-bottom: 1px solid var(--bd);
  cursor: pointer; display: flex; align-items: center; gap: 10px;
}
.cl-item:hover { background: rgba(0,0,0,.03); }
.cl-item.active { background: rgba(0,0,0,.05); border-left: 2px solid var(--ac); }
.cl-dot {
  width: 26px; height: 26px; border-radius: 50%;
  background: #000; color: #fff; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-family: var(--font);
}
.cl-info { min-width: 0; }
.cl-name { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cl-company { font-size: 8px; letter-spacing: .22em; color: var(--dim); text-transform: uppercase; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#collab-empty { padding: 36px 18px; text-align: center; color: var(--dim); font-size: 9px; letter-spacing: .3em; text-transform: uppercase; line-height: 2; }

/* ── ADD FORM ── */
#form-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(255,255,255,.7); display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
#form-overlay.show { display: flex; }
#form-box {
  background: #fff; border: 1px solid var(--bd); border-top: 2px solid var(--ac);
  width: 340px; padding: 28px 28px 24px; box-shadow: 0 8px 48px rgba(0,0,0,.10);
}
#form-box h3 { font-size: 10px; letter-spacing: .5em; text-transform: uppercase; margin-bottom: 22px; }
.f-row { margin-bottom: 16px; }
.f-label { font-size: 8px; letter-spacing: .4em; text-transform: uppercase; color: var(--dim); display: block; margin-bottom: 6px; }
.f-input {
  width: 100%; background: #fff; border: 1px solid var(--bd); color: var(--txt);
  font-family: var(--font); font-size: 11px; letter-spacing: .1em;
  padding: 9px 10px; outline: none; transition: border-color .2s;
}
.f-input:focus { border-color: var(--ac); }
.f-input::placeholder { color: #ccc; }
textarea.f-input { resize: vertical; min-height: 64px; }
.f-actions { display: flex; gap: 10px; margin-top: 20px; }
.f-btn {
  flex: 1; padding: 10px; border: 1px solid var(--bd); background: none;
  font-family: var(--font); font-size: 9px; letter-spacing: .4em; text-transform: uppercase;
  cursor: pointer; color: var(--dim);
}
.f-btn:hover { color: var(--txt); border-color: var(--ac); }
.f-btn.primary { border-color: var(--ac); color: var(--txt); }
.f-btn.primary:hover { background: var(--ac); color: #fff; }
#form-status { font-size: 8px; letter-spacing: .25em; color: var(--dim); margin-top: 10px; min-height: 14px; }

/* ── PAGE COUNTER ── */
#page-counter {
  position: fixed;
  bottom: 24px;
  right: 28px;
  font-size: 8px;
  letter-spacing: .4em;
  text-transform: uppercase;
  color: var(--dim);
  z-index: 200;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="layout">

  <!-- ── LEFT NAV ── -->
  <nav id="nav">
    <div id="site-title">
      Yu-Ting Chang
      <div id="site-subtitle">Portfolio</div>
    </div>
    <div id="page-list">
      <div class="nav-item active" data-page="design">
        <span class="nav-num">01</span>
        <span class="nav-label">Design</span>
      </div>
      <div class="nav-item" data-page="sysvis">
        <span class="nav-num">02</span>
        <span class="nav-label">System Visualization</span>
      </div>
      <div class="nav-item" data-page="twin">
        <span class="nav-num">03</span>
        <span class="nav-label">Digital Twin</span>
      </div>
      <div class="nav-item" data-page="map">
        <span class="nav-num">04</span>
        <span class="nav-label">Collab Map</span>
      </div>
    </div>
    <div id="nav-footer">
      &copy; 2026<br>
      All rights reserved
    </div>
  </nav>

  <!-- ── CONTENT ── -->
  <div id="content">

    <!-- Page 1: Design -->
    <div class="page active" id="page-design">
      <div id="gallery-grid"></div>
      <div id="design-label">Yu-Ting Chang — Design</div>
    </div>

    <!-- Page 2: System Visualization -->
    <div class="page page-video" id="page-sysvis">
      <video class="vs-video" autoplay muted loop playsinline>
        <source src="video/videoA.mov" type="video/mp4">
      </video>
      <div class="vs-label">System Visualization</div>
    </div>

    <!-- Page 3: Digital Twin -->
    <div class="page page-video" id="page-twin">
      <video class="vs-video" autoplay muted loop playsinline>
        <source src="video/VideoB.mov" type="video/mp4">
      </video>
      <div class="vs-label">Digital Twin</div>
    </div>

    <!-- Page 4: Collab Map -->
    <div class="page" id="page-map">
      <div id="map"></div>

      <div id="map-sidebar">
        <div id="msb-head">
          <h2>Collab</h2>
          <span id="msb-count">0 locations</span>
        </div>
        <button id="map-add-btn">+ Add Collab</button>
        <div id="collab-list">
          <div id="collab-empty">No collabs yet<br>click + Add Collab to begin</div>
        </div>
        <button id="msb-toggle">COLLABS</button>
      </div>
    </div>

  </div><!-- /#content -->
</div><!-- /#layout -->

<!-- ── ADD FORM OVERLAY ── -->
<div id="form-overlay">
  <div id="form-box">
    <h3>Add Collab</h3>
    <div class="f-row">
      <label class="f-label" for="f-name">Name</label>
      <input class="f-input" id="f-name" type="text" placeholder="Jane Smith" autocomplete="off">
    </div>
    <div class="f-row">
      <label class="f-label" for="f-company">Company</label>
      <input class="f-input" id="f-company" type="text" placeholder="Acme Studio" autocomplete="off">
    </div>
    <div class="f-row">
      <label class="f-label" for="f-location">City / Location</label>
      <input class="f-input" id="f-location" type="text" placeholder="New York, NY" autocomplete="off">
    </div>
    <div class="f-row">
      <label class="f-label" for="f-notes">Notes</label>
      <textarea class="f-input" id="f-notes" placeholder="Industry, project scope, contact info…"></textarea>
    </div>
    <div id="form-status"></div>
    <div class="f-actions">
      <button class="f-btn" id="f-cancel">Cancel</button>
      <button class="f-btn primary" id="f-save">Save</button>
    </div>
  </div>
</div>

<!-- ── PAGE COUNTER ── -->
<div id="page-counter"><span id="pc-cur">01</span> / 04</div>

<script>
// ── PAGE NAVIGATION ───────────────────────────────────────────────────
const pages = ['design', 'sysvis', 'twin', 'map'];
let currentPage = 'design';

function goToPage(id) {
  if (!pages.includes(id)) return;
  // deactivate old
  document.getElementById('page-' + currentPage).classList.remove('active');
  document.querySelector(`.nav-item[data-page="${currentPage}"]`).classList.remove('active');
  // activate new
  currentPage = id;
  document.getElementById('page-' + id).classList.add('active');
  document.querySelector(`.nav-item[data-page="${id}"]`).classList.add('active');
  // update counter
  const idx = pages.indexOf(id) + 1;
  document.getElementById('pc-cur').textContent = String(idx).padStart(2, '0');
  // fix Leaflet size if map page
  if (id === 'map') setTimeout(() => map.invalidateSize(), 50);
}

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => goToPage(el.dataset.page));
});

// ── KEYBOARD NAV ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const idx = pages.indexOf(currentPage);
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    goToPage(pages[Math.min(idx + 1, pages.length - 1)]);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    goToPage(pages[Math.max(idx - 1, 0)]);
  }
});

// ── MAP INIT ──────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true, attributionControl: true }).setView([30, 10], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── MAP STATE ─────────────────────────────────────────────────────────
let clients = JSON.parse(localStorage.getItem('clientmap_v1') || '[]');
let markers = {};
let activeId = null;

function makeIcon(initials) {
  return L.divIcon({
    className: '',
    html: `<div style="width:30px;height:30px;border-radius:50%;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Share Tech',monospace;font-size:8px;letter-spacing:.04em;box-shadow:0 0 0 2px #fff,0 2px 12px rgba(0,0,0,.25);cursor:pointer;">${initials}</div>`,
    iconSize: [30,30], iconAnchor: [15,15], popupAnchor: [0,-18]
  });
}
function getInitials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}
function popupHTML(c, idx) {
  return `<div class="pu-body">
    <div class="pu-top">
      <span class="pu-idx">COLLAB — ${String(idx+1).padStart(2,'0')}</span>
      <button class="pu-remove" onclick="removeClient('${c.id}')">REMOVE</button>
    </div>
    <div class="pu-name">${c.name}</div>
    ${c.company ? `<div class="pu-company">${c.company}</div>` : ''}
    ${c.notes   ? `<div class="pu-notes">${c.notes}</div>` : ''}
    <div class="pu-coord">${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}</div>
  </div>`;
}

function renderMapSidebar() {
  const list = document.getElementById('collab-list');
  const empty = document.getElementById('collab-empty');
  document.getElementById('msb-count').textContent = `${clients.length} location${clients.length !== 1 ? 's' : ''}`;
  if (clients.length === 0) { empty.style.display = ''; list.innerHTML = ''; list.appendChild(empty); return; }
  empty.style.display = 'none'; list.innerHTML = '';
  clients.forEach(c => {
    const row = document.createElement('div');
    row.className = 'cl-item' + (c.id === activeId ? ' active' : '');
    row.dataset.id = c.id;
    row.innerHTML = `<div class="cl-dot">${getInitials(c.name)}</div>
      <div class="cl-info">
        <div class="cl-name">${c.name}</div>
        ${c.company ? `<div class="cl-company">${c.company}</div>` : ''}
      </div>`;
    row.addEventListener('click', () => flyTo(c));
    list.appendChild(row);
  });
}

function addMarker(c) {
  if (markers[c.id]) return;
  const idx = clients.findIndex(x => x.id === c.id);
  const marker = L.marker([c.lat, c.lng], { icon: makeIcon(getInitials(c.name)) })
    .addTo(map).bindPopup(popupHTML(c, idx), { maxWidth: 260 });
  marker.on('click', () => setActive(c.id));
  markers[c.id] = marker;
}

function render() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  renderMapSidebar();
  clients.forEach(c => addMarker(c));
}

function setActive(id) {
  activeId = id;
  document.querySelectorAll('.cl-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
}
function flyTo(c) {
  setActive(c.id);
  map.flyTo([c.lat, c.lng], 12, { duration: 1.2 });
  setTimeout(() => markers[c.id]?.openPopup(), 1300);
}

window.removeClient = function(id) {
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  clients = clients.filter(c => c.id !== id); save(); map.closePopup();
  if (activeId === id) activeId = null;
  renderMapSidebar();
  clients.forEach((c, idx) => markers[c.id]?.setPopupContent(popupHTML(c, idx)));
};
function save() { localStorage.setItem('clientmap_v1', JSON.stringify(clients)); }

async function geocode(query) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  const data = await res.json();
  if (!data.length) throw new Error('Location not found');
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
}

// form refs
const overlay  = document.getElementById('form-overlay');
const fName    = document.getElementById('f-name');
const fCompany = document.getElementById('f-company');
const fLoc     = document.getElementById('f-location');
const fNotes   = document.getElementById('f-notes');
const fStatus  = document.getElementById('form-status');

document.getElementById('map-add-btn').addEventListener('click', () => {
  fName.value = fCompany.value = fLoc.value = fNotes.value = ''; fStatus.textContent = '';
  overlay.classList.add('show'); fName.focus();
});
document.getElementById('f-cancel').addEventListener('click', () => overlay.classList.remove('show'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });

document.getElementById('f-save').addEventListener('click', async () => {
  const name = fName.value.trim(), loc = fLoc.value.trim();
  if (!name) { fStatus.textContent = 'Name is required.'; return; }
  if (!loc)  { fStatus.textContent = 'Location is required.'; return; }
  fStatus.textContent = 'Geocoding…';
  document.getElementById('f-save').disabled = true;
  try {
    const { lat, lng } = await geocode(loc);
    const client = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      name, company: fCompany.value.trim(), location: loc, notes: fNotes.value.trim(), lat, lng
    };
    clients.push(client); save();
    addMarker(client);
    renderMapSidebar();
    overlay.classList.remove('show');
    setTimeout(() => flyTo(client), 150);
  } catch(e) {
    fStatus.textContent = 'Could not find that location.';
  } finally {
    document.getElementById('f-save').disabled = false;
  }
});

[fName, fCompany, fLoc, fNotes].forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) document.getElementById('f-save').click();
  });
});

document.getElementById('msb-toggle').addEventListener('click', () => {
  document.getElementById('map-sidebar').classList.toggle('off');
});

// ── DESIGN GALLERY ────────────────────────────────────────────────────
(function initGallery() {
  const images = [
    'image/1.webp.avif', 'image/2.webp.avif', 'image/3.jpg',
    'image/4.gif',       'image/5.png',        'image/6.png',
    'image/7.jpg',       'image/8.jpg',        'image/9.png',
    'image/10.jpg',      'image/11.jpg',       'image/12.jpg',
  ];
  const cols = 4, rows = 3;
  const cw = 100 / cols;
  const ch = 100 / rows;
  const grid = document.getElementById('gallery-grid');
  const styleEl = document.createElement('style');
  document.head.appendChild(styleEl);

  images.forEach((src, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx = cw * col + cw / 2;
    const cy = ch * row + ch / 2;
    const rise  = (6 + Math.random() * 8).toFixed(1);
    const dur   = (3 + Math.random() * 3.5).toFixed(2);
    const delay = (Math.random() * -6).toFixed(2);

    styleEl.sheet.insertRule(`
      @keyframes bob${i} {
        0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
        50%       { transform: translate(-50%, -50%) translateY(-${rise}px); }
      }
    `, styleEl.sheet.cssRules.length);

    const cell = document.createElement('div');
    cell.className = 'gallery-cell';
    cell.style.left      = `${cx}%`;
    cell.style.top       = `${cy}%`;
    cell.style.width     = `${cw * 0.78}vw`;
    cell.style.maxHeight = `${ch * 0.82}vh`;
    cell.style.animation = `bob${i} ${dur}s ${delay}s ease-in-out infinite`;

    const img = document.createElement('img');
    img.src = src;
    img.className = 'gallery-img';
    cell.appendChild(img);
    grid.appendChild(cell);
  });
})();

// ── INIT ──────────────────────────────────────────────────────────────
render();
</script>
